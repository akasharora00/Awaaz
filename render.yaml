services:
  - type: web
    name: awaaz-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://awaaz-client.onrender.com
  - type: web
    name: awaaz-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://awaaz-server.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://awaaz-server.onrender.com
